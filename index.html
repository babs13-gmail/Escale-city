<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#050400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Escale Gaming">
<title>SCORPION GAMER 2026 — Saison 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap');

:root {
  --gold:    #d4a843;
  --gold2:   #f5c518;
  --gold3:   #ffe082;
  --goldD:   #8a6520;
  --dark:    #050400;
  --dark2:   #0c0a00;
  --dark3:   #141000;
  --dark4:   #1c1600;
  --white:   #fff8e8;
  --muted:   rgba(212,168,67,0.38);
  --glass:   rgba(212,168,67,0.04);
  --border:  rgba(212,168,67,0.12);
  --borderG: rgba(212,168,67,0.28);
  --green:   #4caf82;
  --blue:    #4a9eff;
  --text:    #f0e0b0;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUNDS ── */
.bg-layer {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 100% 60% at 50% -10%, rgba(180,130,20,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 0% 80%, rgba(120,80,0,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 100% 20%, rgba(120,80,0,0.08) 0%, transparent 50%);
}
.grid-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(212,168,67,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,67,0.04) 1px, transparent 1px);
  background-size:52px 52px;
}
/* diagonal gold lines */
.diag-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.diag-bg::before {
  content:''; position:absolute; top:-50%; left:20%; width:1px; height:200%;
  background:linear-gradient(to bottom,transparent,rgba(212,168,67,0.08),transparent);
  transform:rotate(25deg);
}
.diag-bg::after {
  content:''; position:absolute; top:-50%; right:20%; width:1px; height:200%;
  background:linear-gradient(to bottom,transparent,rgba(212,168,67,0.06),transparent);
  transform:rotate(-25deg);
}

/* ── GOLD TEXT GRADIENT ── */
.gold-text {
  background: linear-gradient(135deg, var(--gold3) 0%, var(--gold2) 40%, var(--gold) 70%, var(--goldD) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── HEADER ── */
header {
  position: sticky; top:0; z-index:200;
  background: rgba(5,4,0,0.97);
  backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--borderG);
  box-shadow: 0 1px 30px rgba(212,168,67,0.06);
}
.header-crown {
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 16px;
}
.logo-wrap { display:flex; flex-direction:column; }
.logo-name {
  font-family:'Cinzel', serif; font-size:16px; font-weight:900;
  letter-spacing:2px; line-height:1;
  background: linear-gradient(135deg, var(--gold3), var(--gold), var(--goldD));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-sub { font-family:'Orbitron',monospace; font-size:8px; font-weight:400; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-top:3px; }
.crown-badge {
  display:flex; align-items:center; gap:5px;
  font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:2px;
  color:var(--gold); border:1px solid var(--borderG);
  background: linear-gradient(135deg,rgba(212,168,67,0.1),rgba(212,168,67,0.03));
  padding:5px 12px; border-radius:2px; text-transform:uppercase;
}

/* ── NAV ── */
.nav-strip {
  display:flex; overflow-x:auto; border-top:1px solid var(--border);
  scrollbar-width:none;
}
.nav-strip::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 14px; background:none; border:none; color:rgba(212,168,67,0.35);
  font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer;
  transition:all .25s; border-bottom:2px solid transparent; white-space:nowrap;
}
.tab .ti { font-size:14px; }
.tab.active {
  color: var(--gold2);
  border-bottom: 2px solid var(--gold);
  background: linear-gradient(to bottom, rgba(212,168,67,0.06), transparent);
}

/* ── PAGES ── */
.page { display:none; position:relative; z-index:1; padding:16px 14px 100px; }
.page.active { display:block; }

/* ── HERO ── */
.hero {
  position:relative; z-index:1;
  padding: 32px 16px 24px; text-align:center;
}
.hero-diamonds { display:flex; justify-content:center; gap:10px; margin-bottom:16px; }
.hd { font-size:10px; color:var(--gold); opacity:.6; animation:hda 2s ease-in-out infinite alternate; }
.hd:nth-child(2){animation-delay:.2s;opacity:.9;font-size:14px;}
.hd:nth-child(3){animation-delay:.4s;opacity:1;font-size:18px;filter:drop-shadow(0 0 8px var(--gold2));}
.hd:nth-child(4){animation-delay:.2s;opacity:.9;font-size:14px;}
.hd:nth-child(5){animation-delay:0s;opacity:.6;font-size:10px;}
@keyframes hda{from{filter:drop-shadow(0 0 2px var(--gold))}to{filter:drop-shadow(0 0 12px var(--gold2))}}

.hero-pre { font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:6px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.hero-title { font-family:'Cinzel',serif; font-size:clamp(36px,10vw,60px); font-weight:900; line-height:.88; letter-spacing:3px; }
.hero-title .line1 { color:var(--white); display:block; }
.hero-title .line2 {
  display:block; margin-top:4px;
  background:linear-gradient(135deg,var(--gold3),var(--gold2),var(--gold),var(--goldD));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 20px rgba(212,168,67,0.4));
}
.hero-title .line3 { font-size:.45em; color:rgba(212,168,67,0.5); letter-spacing:8px; display:block; margin-top:6px; font-family:'Orbitron',monospace; font-weight:700; }

.hero-divider {
  display:flex; align-items:center; gap:10px; margin:18px 0;
}
.hd-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.hd-diamond { color:var(--gold2); font-size:12px; filter:drop-shadow(0 0 6px var(--gold2)); }

.hero-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.hstat {
  position:relative; overflow:hidden;
  background: linear-gradient(135deg,rgba(212,168,67,0.08),rgba(212,168,67,0.02));
  border:1px solid var(--borderG); border-radius:4px; padding:14px 8px; text-align:center;
}
.hstat::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
}
.hstat-num { font-family:'Cinzel',serif; font-size:26px; font-weight:700; display:block; line-height:1;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hstat-lbl { font-family:'Orbitron',monospace; font-size:7px; font-weight:700; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:5px; }

/* ── SECTION HEADER ── */
.sec-hd { display:flex; align-items:center; gap:10px; margin-bottom:16px; margin-top:8px; }
.sec-title { font-family:'Cinzel',serif; font-size:22px; font-weight:700; white-space:nowrap;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sec-line { flex:1; height:1px; background:linear-gradient(90deg,var(--gold),transparent); opacity:.3; }
.sec-badge {
  font-family:'Orbitron',monospace; font-size:7px; font-weight:700; letter-spacing:3px;
  color:var(--gold); border:1px solid var(--borderG); background:rgba(212,168,67,0.06);
  padding:3px 8px; border-radius:2px; white-space:nowrap; text-transform:uppercase;
}

/* ── GROUP SWITCHER ── */
.group-tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.gtab {
  flex:1; min-width:80px; padding:10px; border-radius:3px; cursor:pointer; transition:all .2s; text-align:center;
  font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:1px;
  background:none; border:1px solid var(--border); color:var(--muted);
}
.gtab.act {
  color:var(--gold2); border-color:var(--borderG);
  background:linear-gradient(135deg,rgba(212,168,67,0.12),rgba(212,168,67,0.03));
}

/* ── STANDINGS ── */
.standings-card {
  border-radius:6px; overflow:hidden;
  border:1px solid var(--borderG);
  background:linear-gradient(135deg,rgba(212,168,67,0.04),rgba(0,0,0,0));
  margin-bottom:14px; position:relative;
}
.standings-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
}
.card-hd {
  padding:12px 16px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(212,168,67,0.1),rgba(212,168,67,0.02));
}
.card-letter {
  font-family:'Cinzel',serif; font-size:36px; font-weight:900; line-height:1;
  background:linear-gradient(135deg,var(--gold3),var(--gold),var(--goldD));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card-info .cn { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:var(--white); letter-spacing:1px; }
.card-info .cs { font-family:'Orbitron',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; margin-top:2px; }

.st-table { width:100%; border-collapse:collapse; }
.st-table th {
  font-family:'Orbitron',monospace; font-size:7px; font-weight:700; letter-spacing:2px;
  color:var(--muted); text-transform:uppercase; padding:8px 6px; text-align:center;
  border-bottom:1px solid var(--border);
}
.st-table th:first-child { text-align:left; padding-left:14px; }
.st-table td { padding:11px 6px; text-align:center; font-size:13px; font-weight:600; border-bottom:1px solid rgba(212,168,67,0.04); }
.st-table td:first-child { text-align:left; padding-left:14px; }
.st-table tr:last-child td { border-bottom:none; }
.st-table tbody tr:hover { background:rgba(212,168,67,0.03); }

.p-rank { font-family:'Cinzel',serif; font-size:11px; color:var(--muted); margin-right:6px; font-weight:700; }
.p-rank.r1 { color:var(--gold2); } .p-rank.r2 { color:#c0c0c0; } .p-rank.r3 { color:#cd7f32; } .p-rank.r4 { color:rgba(212,168,67,0.5); }
.p-name { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--white); }
.p-qual { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); margin-right:5px; }
.pts-val {
  font-family:'Cinzel',serif; font-size:14px; font-weight:900;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.form-row { display:flex; gap:2px; justify-content:center; }
.fb { width:15px; height:15px; border-radius:2px; font-size:7px; font-weight:700; font-family:'Orbitron',monospace; display:flex; align-items:center; justify-content:center; }
.fb.W { background:rgba(76,175,130,0.15); color:var(--green); border:1px solid rgba(76,175,130,0.3); }
.fb.D { background:rgba(212,168,67,0.12); color:var(--gold); border:1px solid rgba(212,168,67,0.3); }
.fb.L { background:rgba(200,60,60,0.12); color:#e05555; border:1px solid rgba(200,60,60,0.25); }

/* ── MATCH CARDS ── */
.j-tag {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'Orbitron',monospace; font-size:8px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  padding:4px 14px; border-radius:2px;
  color:var(--gold); background:rgba(212,168,67,0.07); border:1px solid var(--border);
  margin-bottom:9px;
}
.j-block { margin-bottom:16px; }
.match-card {
  border-radius:5px; padding:13px 14px; margin-bottom:8px;
  display:grid; grid-template-columns:1fr 72px 1fr; align-items:center; gap:8px;
  background:linear-gradient(135deg,rgba(212,168,67,0.05),rgba(212,168,67,0.01));
  border:1px solid var(--border); position:relative; overflow:hidden; transition:all .2s;
}
.match-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,0.3),transparent);
}
.match-card.played { border-color:var(--borderG); background:linear-gradient(135deg,rgba(212,168,67,0.1),rgba(212,168,67,0.03)); }
.mc-name { font-family:'Cinzel',serif; font-size:15px; font-weight:700; color:var(--white); line-height:1.1; }
.mc-name.r { text-align:right; }
.mc-role { font-family:'Orbitron',monospace; font-size:7px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
.mc-role.r { text-align:right; }
.mc-center { text-align:center; }
.mc-score { font-family:'Cinzel',serif; font-size:22px; font-weight:900; color:var(--white); line-height:1; }
.mc-score.done {
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mc-status { font-family:'Orbitron',monospace; font-size:7px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

/* ── BRACKET ── */
.bracket-scroll { overflow-x:auto; padding-bottom:8px; }
.bracket { display:flex; gap:10px; min-width:380px; }
.br-col { flex:1; }
.br-col-title {
  font-family:'Cinzel',serif; font-size:11px; font-weight:700; letter-spacing:2px;
  text-align:center; padding:6px 0 12px;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.br-match { border:1px solid var(--border); border-radius:5px; overflow:hidden; margin-bottom:10px; background:rgba(212,168,67,0.02); }
.br-team {
  padding:9px 11px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); transition:background .15s;
}
.br-team:last-child { border-bottom:none; }
.br-team.winner { background:rgba(212,168,67,0.12); color:var(--gold2); }
.br-team.tbd { color:var(--muted); font-style:italic; font-size:11px; }
.br-sc { font-family:'Cinzel',serif; font-size:11px; font-weight:700; }
.br-lbl { font-family:'Orbitron',monospace; font-size:7px; letter-spacing:2px; color:var(--muted); padding:3px 10px; border-bottom:1px solid var(--border); }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-box {
  border:1px solid var(--borderG); border-radius:5px; padding:16px 12px; text-align:center;
  background:linear-gradient(135deg,rgba(212,168,67,0.07),rgba(212,168,67,0.01));
  position:relative; overflow:hidden;
}
.stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold2),transparent); }
.stat-num { font-family:'Cinzel',serif; font-size:28px; font-weight:900; display:block; line-height:1;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lbl { font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:5px; }

.scorers-card { border:1px solid var(--borderG); border-radius:5px; overflow:hidden; background:linear-gradient(135deg,rgba(212,168,67,0.04),transparent); position:relative; }
.scorers-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold2),transparent); }
.sc-row { display:grid; grid-template-columns:26px 1fr 36px 36px; align-items:center; padding:11px 14px; gap:8px; border-bottom:1px solid rgba(212,168,67,0.05); }
.sc-row:last-child { border-bottom:none; }
.sc-rank { font-family:'Cinzel',serif; font-size:12px; font-weight:700; text-align:center; color:var(--muted); }
.sc-rank.r1{color:var(--gold2);} .sc-rank.r2{color:#c0c0c0;} .sc-rank.r3{color:#cd7f32;}
.sc-name { font-weight:700; font-size:14px; color:var(--white); font-family:'Rajdhani',sans-serif; }
.sc-grp { font-family:'Orbitron',monospace; font-size:7px; font-weight:700; border-radius:2px; padding:2px 5px; text-align:center; color:var(--gold); background:rgba(212,168,67,0.08); border:1px solid var(--border); }
.sc-goals { font-family:'Cinzel',serif; font-size:14px; font-weight:900; text-align:right;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── ADMIN ── */
.admin-lock {
  max-width:360px; margin:32px auto;
  border:1px solid var(--borderG);
  background:linear-gradient(135deg,rgba(212,168,67,0.06),rgba(212,168,67,0.01));
  border-radius:8px; padding:30px 22px; text-align:center; position:relative; overflow:hidden;
}
.admin-lock::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold2),transparent); }
.admin-lock h2 { font-family:'Cinzel',serif; font-size:32px; font-weight:900; margin-bottom:4px;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.admin-lock p { font-family:'Orbitron',monospace; font-size:10px; color:var(--muted); margin-bottom:24px; letter-spacing:2px; }

.form-group { margin-bottom:12px; text-align:left; }
.form-group label { display:block; font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
.form-group input, .form-group select {
  width:100%; background:rgba(212,168,67,0.04); border:1px solid var(--border);
  color:var(--white); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
  padding:11px 13px; border-radius:4px; outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.form-group input:focus, .form-group select:focus { border-color:var(--gold); }
.form-group select option { background:#0c0a00; color:var(--white); }

.btn {
  display:flex; align-items:center; justify-content:center; gap:7px;
  width:100%; padding:13px; border:none; border-radius:4px;
  font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s;
}
.btn:active { transform:scale(0.98); }
.btn-gold { background:linear-gradient(135deg,#8a6520,var(--gold),var(--gold2)); color:#000; }
.btn-green { background:linear-gradient(135deg,#1a4a2a,#2a7a44); color:#fff; }
.btn-gray { background:rgba(212,168,67,0.06); color:var(--text); border:1px solid var(--border); }
.btn-danger { background:linear-gradient(135deg,#4a0000,#880000); color:#fff; }
.btn-sm { padding:9px 14px; font-size:10px; width:auto; display:inline-flex; }

.admin-panel { display:none; }
.admin-panel.on { display:block; }
.admin-card {
  border:1px solid var(--borderG); border-radius:6px; padding:18px; margin-bottom:12px;
  background:linear-gradient(135deg,rgba(212,168,67,0.05),rgba(212,168,67,0.01));
  position:relative; overflow:hidden;
}
.admin-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.admin-card h3 { font-family:'Cinzel',serif; font-size:18px; font-weight:700; margin-bottom:14px;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:t
